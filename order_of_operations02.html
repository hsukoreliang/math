<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>四則運算練習器 - 完整記錄版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background-color: #f0f2f5; }
        .problem-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; position: relative; }
        .q-number { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; color: #333; }
        .line-wrapper { display: flex; align-items: center; position: relative; height: 70px; }
        .feedback { position: absolute; left: -40px; font-size: 1.5rem; font-weight: bold; width: 30px; }
        .correct { color: #4CAF50; }
        .wrong { color: #F44336; }
        .line { font-size: 2.2rem; display: flex; align-items: center; width: 100%; }
        input { width: 90px; height: 55px; font-size: 1.8rem; text-align: center; border: 2px solid #555; border-radius: 5px; margin: 0 10px; outline: none; }
        input:focus { border-color: #2196F3; }
        .final-input { width: 150px; }
        .btn-group { margin-top: 30px; display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 530px; }
        button { padding: 12px 15px; font-size: 1rem; cursor: pointer; border: none; border-radius: 8px; color: white; transition: 0.2s; white-space: nowrap; }
        .btn-check { background-color: #FF9800; }
        .btn-next { background-color: #2196F3; }
        .btn-end { background-color: #757575; }
        button:hover { opacity: 0.9; transform: scale(1.05); }
        .report { background: white; padding: 30px; border-radius: 15px; width: 500px; margin-top: 20px; display: none; }
        .wrong-item { color: #F44336; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 1.1rem; line-height: 1.6; }
    </style>
</head>
<body>

<div id="exerciseArea">
    <div class="problem-container">
        <div id="qNum" class="q-number"></div>
        <div class="line-wrapper"><div class="line" id="qStr"></div></div>
        <div class="line-wrapper">
            <div id="f1" class="feedback"></div>
            <div class="line" id="stepArea"></div>
        </div>
        <div class="line-wrapper">
            <div id="f2" class="feedback"></div>
            <div class="line">＝ <input type="number" id="ansInput" class="final-input"></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-check" onclick="checkAnswer(true)">檢查答案</button>
        <button class="btn-next" onclick="nextWithAutoCheck()">下一題</button>
        <button class="btn-end" onclick="endWithAutoCheck()">結束練習</button>
    </div>
</div>

<div id="reportArea" class="report">
    <h2 style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px;">練習成果統計</h2>
    <p id="statTime" style="font-size: 1.2rem;"></p>
    <p id="statScore" style="font-size: 1.2rem; font-weight: bold;"></p>
    <div id="wrongList"></div>
    <button onclick="location.reload()" style="background:#2196F3; margin-top:20px; width:100%;">重新練習</button>
</div>

<script>
let count = 0;
let correctCount = 0;
let startTime = new Date();
let wrongProblems = [];
let currentAnswer1, currentFinalAnswer, currentQText;
let isCurrentProblemHandled = false; // 標記當前題目是否已計算入統計

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makeProblem() {
    count++;
    isCurrentProblemHandled = false;
    document.getElementById('f1').innerHTML = '';
    document.getElementById('f2').innerHTML = '';
    document.getElementById('ansInput').value = '';
    
    const types = ['pre_mul', 'post_mul', 'pre_div', 'post_div'];
    const type = types[Math.floor(Math.random() * types.length)];
    const isAdd = Math.random() > 0.5;
    const op = isAdd ? '+' : '－';

    if (type === 'pre_mul') {
        let a = rand(2, 9), b = rand(2, 9), c = rand(5, 50);
        let p1 = a * b;
        if (!isAdd && p1 < c) { count--; return makeProblem(); }
        currentAnswer1 = p1;
        currentFinalAnswer = isAdd ? (p1 + c) : (p1 - c);
        currentQText = `${a} × ${b} ${op} ${c}`;
        document.getElementById('stepArea').innerHTML = `＝ <input type="number" id="stepInput"> ${op} ${c}`;
    } else if (type === 'post_mul') {
        let b = rand(2, 9), c = rand(2, 9), p2 = b * c;
        let a = isAdd ? rand(10, 50) : rand(p2 + 1, 99);
        currentAnswer1 = p2;
        currentFinalAnswer = isAdd ? (a + p2) : (a - p2);
        currentQText = `${a} ${op} ${b} × ${c}`;
        document.getElementById('stepArea').innerHTML = `＝ ${a} ${op} <input type="number" id="stepInput">`;
    } else if (type === 'pre_div') {
        let b = rand(2, 9), res = rand(2, 9), a = b * res, c = rand(5, 50);
        if (!isAdd && res < c) { count--; return makeProblem(); }
        currentAnswer1 = res;
        currentFinalAnswer = isAdd ? (res + c) : (res - c);
        currentQText = `${a} ÷ ${b} ${op} ${c}`;
        document.getElementById('stepArea').innerHTML = `＝ <input type="number" id="stepInput"> ${op} ${c}`;
    } else {
        let c = rand(2, 9), res = rand(2, 9), b = c * res;
        let a = isAdd ? rand(10, 50) : rand(res + 1, 99);
        currentAnswer1 = res;
        currentFinalAnswer = isAdd ? (a + res) : (a - res);
        currentQText = `${a} ${op} ${b} ÷ ${c}`;
        document.getElementById('stepArea').innerHTML = `＝ ${a} ${op} <input type="number" id="stepInput">`;
    }
    document.getElementById('qNum').innerText = `(${count})`;
    document.getElementById('qStr').innerText = currentQText;
}

// 核心檢查邏輯：showFeedback 控制是否在畫面上顯示打勾打叉
function checkAnswer(showFeedback = true) {
    if (isCurrentProblemHandled) return;

    const u1 = parseInt(document.getElementById('stepInput').value);
    const u2 = parseInt(document.getElementById('ansInput').value);
    const r1 = (u1 === currentAnswer1);
    const r2 = (u2 === currentFinalAnswer);

    if (showFeedback) {
        document.getElementById('f1').innerHTML = r1 ? '✔️' : '❌';
        document.getElementById('f1').className = r1 ? 'feedback correct' : 'feedback wrong';
        document.getElementById('f2').innerHTML = r2 ? '✔️' : '❌';
        document.getElementById('f2').className = r2 ? 'feedback correct' : 'feedback wrong';
    }

    if (r1 && r2) {
        correctCount++;
    } else {
        wrongProblems.push(`${currentQText} (正確答案: 第一步 ${currentAnswer1}, 結果 ${currentFinalAnswer})`);
    }
    isCurrentProblemHandled = true;
}

function nextWithAutoCheck() {
    checkAnswer(false); // 在後台檢查但不顯示打勾叉
    makeProblem();
}

function endWithAutoCheck() {
    checkAnswer(false); // 確保最後一題也被記錄
    renderReport();
}

function renderReport() {
    const endTime = new Date();
    const diff = Math.floor((endTime - startTime) / 1000);
    const mins = Math.floor(diff / 60);
    const secs = diff % 60;

    document.getElementById('exerciseArea').style.display = 'none';
    document.getElementById('reportArea').style.display = 'block';
    document.getElementById('statTime').innerText = `練習時間：${mins} 分 ${secs} 秒`;
    document.getElementById('statScore').innerText = `共練習 ${count} 題，答對 ${correctCount} 題，答錯 ${count - correctCount} 題`;

    const list = document.getElementById('wrongList');
    if(wrongProblems.length > 0) {
        list.innerHTML = '<h3>錯誤題目回顧：</h3>';
        wrongProblems.forEach((p, i) => {
            list.innerHTML += `<div class="wrong-item">${i+1}. ${p}</div>`;
        });
    } else {
        list.innerHTML = '<h3 style="color:green;">太棒了！全部正確！</h3>';
    }
}

makeProblem();
</script>
</body>
</html>
